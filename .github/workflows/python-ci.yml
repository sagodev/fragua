name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10","3.11"]

    env:
      PYTHONPATH: ${{ github.workspace }}/fragua

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy pytest pylint black

      - name: Autoformat code with Black
        run: |
          black .

      - name: Check code formatting with Black
        run: |
          black --check .

      - name: Lint with pylint
        run: |
          pylint --disable=C0111,C0103 fragua/agents fragua/core fragua/utils 

      - name: Type checking with mypy
        run: |
          mypy fragua/agents fragua/core fragua/utils

      - name: Run tests with pytest
        working-directory: ./tests
        run: |
          pytest -v
